# ============================================================================
# ERA XDR — локальное dev-окружение (Фаза 1 / MVP)
#
# Поднимает фундамент сквозного конвейера телеметрии:
#   Kafka (KRaft, без Zookeeper) + ClickHouse + Apicurio Registry + MinIO (cold) + Kafka UI
#
# Запуск:
#   docker compose -f deploy/docker-compose.dev.yml up -d
#
# Проверка:
#   ClickHouse   : http://localhost:8123/play   (или clickhouse-client)
#   Apicurio UI  : http://localhost:8085
#   Kafka UI     : http://localhost:8088
#   MinIO console: http://localhost:9001  (minioadmin / minioadmin)
#
# Это DEV-конфиг: без TLS/auth-хардненинга. Прод — отдельные Helm-чарты (deploy/helm).
# ============================================================================

name: era-one-dev

services:
  kafka:
    image: apache/kafka:3.8.0
    container_name: era-kafka
    ports:
      - "9092:9092"   # EXTERNAL listener для агента/шлюза с хоста (localhost:9092)
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      # INTERNAL — для контейнеров (kafka:29092), EXTERNAL — для хоста (localhost:9092)
      KAFKA_LISTENERS: "INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: "168"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15

  # Топики ERA XDR (topic-per-domain). Создаются один раз при старте.
  kafka-init:
    image: apache/kafka:3.8.0
    container_name: era-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        for t in process network file registry auth dns module raw inventory; do
          /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists \
            --topic xdr.$$t --partitions 6 --replication-factor 1 \
            --config compression.type=zstd;
        done;
        echo "ERA XDR topics ready";
    restart: "no"

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: era-clickhouse
    ports:
      - "8123:8123"   # HTTP / play UI
      - "9000:9000"   # native protocol
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      CLICKHOUSE_DB: era_xdr
      CLICKHOUSE_USER: era
      CLICKHOUSE_PASSWORD: era_dev_pw
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      # storage policy (tiering) монтируется в config.d ДО старта
      - ./clickhouse/002_storage_policy.xml:/etc/clickhouse-server/config.d/storage_policy.xml:ro
      # DDL применяется при первой инициализации
      - ./clickhouse/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./clickhouse/003_rollups.sql:/docker-entrypoint-initdb.d/003_rollups.sql:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # MinIO — cold-уровень хранения (S3-совместимый), для air-gap-абстракции.
  minio:
    image: minio/minio:latest
    container_name: era-minio
    ports:
      - "9001:9001"   # console
      - "9002:9000"   # S3 API (наружу под 9002, чтобы не конфликтовать с CH native)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5

  # Apicurio Registry — governance схем (ADR-0001), in-memory для dev.
  apicurio:
    image: apicurio/apicurio-registry-mem:2.5.11.Final
    container_name: era-apicurio
    ports:
      - "8085:8080"   # 8080 на хосте занят Docker Desktop, поэтому наружу 8085
    environment:
      QUARKUS_HTTP_CORS: "true"

  # Kafka UI — наблюдаемость dev-кластера.
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: era-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8088:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: era-one-dev
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

volumes:
  kafka-data:
  clickhouse-data:
  minio-data:
