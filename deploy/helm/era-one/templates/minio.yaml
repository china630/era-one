{{- if .Values.minio.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "era-one.fullname" . }}-minio
  labels:
    app.kubernetes.io/name: {{ include "era-one.name" . }}
    app.kubernetes.io/component: minio
spec:
  ports:
    - port: {{ .Values.minio.apiPort }}
      targetPort: api
      name: api
    - port: {{ .Values.minio.consolePort }}
      targetPort: console
      name: console
  selector:
    app.kubernetes.io/name: {{ include "era-one.name" . }}
    app.kubernetes.io/component: minio
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "era-one.fullname" . }}-minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "era-one.name" . }}
      app.kubernetes.io/component: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "era-one.name" . }}
        app.kubernetes.io/component: minio
    spec:
      containers:
        - name: minio
          image: {{ .Values.minio.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args: ["server", "/data", "--console-address", ":{{ .Values.minio.consolePort }}"]
          ports:
            - containerPort: {{ .Values.minio.apiPort }}
              name: api
            - containerPort: {{ .Values.minio.consolePort }}
              name: console
          env:
            - name: MINIO_ROOT_USER
              value: {{ .Values.minio.rootUser | quote }}
            - name: MINIO_ROOT_PASSWORD
              value: {{ .Values.minio.rootPassword | quote }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "era-one.fullname" . }}-minio
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "era-one.fullname" . }}-minio
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ default "50Gi" .Values.minio.persistence.size }}
{{- end }}
