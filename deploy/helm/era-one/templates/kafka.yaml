{{- if .Values.kafka.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "era-one.fullname" . }}-kafka
  labels:
    app.kubernetes.io/name: {{ include "era-one.name" . }}
    app.kubernetes.io/component: kafka
spec:
  ports:
    - port: {{ .Values.kafka.servicePort }}
      targetPort: 9092
      name: external
    - port: 29092
      targetPort: 29092
      name: internal
  selector:
    app.kubernetes.io/name: {{ include "era-one.name" . }}
    app.kubernetes.io/component: kafka
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "era-one.fullname" . }}-kafka
spec:
  replicas: {{ .Values.kafka.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "era-one.name" . }}
      app.kubernetes.io/component: kafka
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "era-one.name" . }}
        app.kubernetes.io/component: kafka
    spec:
      containers:
        - name: kafka
          image: {{ .Values.kafka.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 9092
            - containerPort: 29092
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@127.0.0.1:9093"
            - name: KAFKA_LISTENERS
              value: "INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "INTERNAL://{{ include "era-one.fullname" . }}-kafka:29092,EXTERNAL://localhost:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "INTERNAL"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
{{- end }}
