# SOC Portal — reverse proxy + SSO headers (pilot / on-prem IdP)
#
# Usage:
#   docker compose -f deploy/docker-compose.prod.yml --profile sso up -d
#   open http://localhost:8443/ui/portal/
#
# Production: replace auth_request with your IdP (Keycloak, ADFS, oauth2-proxy).

upstream era_control_plane {
    server control-plane:8090;
}

server {
    listen 8443;
    server_name _;

    # Demo SSO mapping (replace with auth_request + IdP in production):
    # map $remote_user $era_role { default analyst; admin admin; }
    set $era_role "analyst";
    set $era_actor "sso-user@customer.local";

    location / {
        proxy_pass http://era_control_plane;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-ERA-Role $era_role;
        proxy_set_header X-ERA-Actor $era_actor;
    }
}
