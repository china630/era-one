# DigitalOcean App Platform — production static site (ветка site-prod).
#
# site-prod содержит ТОЛЬКО собранный dist/site/ (без Cargo.toml, без Rust buildpack).
# Сборка — в GitHub Actions (workflow Site deploy) из монорепо main.
#
# doctl apps create --spec deploy/site/do-app-platform.yaml
# doctl apps update $APP_ID --spec deploy/site/do-app-platform.yaml

name: era-one-site-prod
region: fra

static_sites:
  - name: web
    github:
      repo: china630/era-one
      branch: site-prod
      deploy_on_push: true
    source_dir: /
    output_dir: /
    environment_slug: html
    catchall_document: index.html
    routes:
      - path: /
