# Деплой публичного сайта (site/) — отдельно от продукта ERA XDR.
#
# Production: GitHub Actions собирает dist/site/ → пушит в ветку site-prod (только HTML/JS).
# DigitalOcean App Platform подключён к site-prod (без Rust buildpack, без build command).
#
# Опциональные секреты (Settings → Secrets):
#   DIGITALOCEAN_ACCESS_TOKEN + DO_APP_ID_PROD — force redeploy через API
#   DO_APP_ID_STAGING — только если нужен staging на dev

name: Site deploy

on:
  push:
    branches: [dev, main]
    paths:
      - "site/**"
      - "docs/distributor/pricing-data.yaml"
      - "docs/distributor/pricing-comms-data.yaml"
      - "docs/distributor/pricing-office-data.yaml"
      - "docs/distributor/assets/**"
      - "scripts/build_portal.py"
      - "scripts/build-site.sh"
      - ".github/workflows/site-deploy.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "staging | production"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

concurrency:
  group: site-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build site artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Build
        run: bash scripts/build-site.sh

      - uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: dist/site/
          retention-days: 30

  deploy-staging:
    name: deploy staging (dev)
    needs: build
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/dev') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    runs-on: ubuntu-latest
    environment: site-staging
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: dist/site

      - name: Trigger DigitalOcean redeploy (staging)
        env:
          DO_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          DO_APP_ID: ${{ secrets.DO_APP_ID_STAGING }}
        run: |
          if [ -z "$DO_TOKEN" ] || [ -z "$DO_APP_ID" ]; then
            echo "SKIP: configure DO_APP_ID_STAGING + DIGITALOCEAN_ACCESS_TOKEN"
            echo "Or connect DO App Platform to GitHub (deploy/site/do-app-platform.yaml, branch dev)"
            find dist/site -type f | wc -l
            exit 0
          fi
          curl -sf -X POST \
            -H "Authorization: Bearer $DO_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.digitalocean.com/v2/apps/$DO_APP_ID/deployments" \
            -d '{"force_build":true}'
          echo "Staging deployment triggered"

  publish-site-prod:
    name: publish site-prod branch
    needs: build
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: publish

      - name: Add DO app spec for site-prod root
        run: |
          mkdir -p publish/.do
          cp deploy/site/site-prod.do-app.yaml publish/.do/app.yaml

      - name: Push to site-prod (static only, no Cargo.toml)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd publish
          git init -b site-prod
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy(site): ${{ github.sha }} from main"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" HEAD:site-prod
          echo "Published $(find . -type f | wc -l) files to branch site-prod"

  deploy-production:
    name: trigger DO redeploy (optional)
    needs: publish-site-prod
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    runs-on: ubuntu-latest
    environment: site-production
    steps:
      - name: Trigger DigitalOcean redeploy (production)
        env:
          DO_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          DO_APP_ID: ${{ secrets.DO_APP_ID_PROD }}
        run: |
          if [ -z "$DO_TOKEN" ] || [ -z "$DO_APP_ID" ]; then
            echo "SKIP: DO autodeploy on site-prod push is enough"
            exit 0
          fi
          curl -sf -X POST \
            -H "Authorization: Bearer $DO_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.digitalocean.com/v2/apps/$DO_APP_ID/deployments" \
            -d '{"force_build":true}'
          echo "Production deployment triggered"
