<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Contacts — ERA One</title>
<meta name="description" content="Contact ERA One about pilots, licensing and deployment inside your contour." />
<link rel="stylesheet" href="assets/site.css" />
</head>
<body data-page="contacts">

<header class="top" id="site-header"></header>

<section class="hero subhero">
  <div class="wrap">
    <div class="eyebrow" data-i18n="nav.contacts">Contacts</div>
    <h1 data-i18n="pg.contacts.h1">Contacts</h1>
    <p class="lead" data-i18n="pg.contacts.lead">Talk to our team about pilots, licensing and deployment in your contour.</p>
  </div>
</section>

<section>
  <div class="wrap">
    <div class="contact-grid">
      <div class="contact-info">
        <div class="ci-row">
          <div class="ci-lbl" data-i18n="contacts.sales">Sales</div>
          <div class="ci-val"><a href="mailto:sales@era-one.solutions">sales@era-one.solutions</a></div>
        </div>
        <div class="ci-row">
          <div class="ci-lbl" data-i18n="contacts.site">Website</div>
          <div class="ci-val"><a href="https://www.era-one.solutions">www.era-one.solutions</a></div>
        </div>
        <div class="ci-row">
          <div class="ci-lbl" data-i18n="contacts.office">Head office</div>
          <div class="ci-val" data-i18n="contacts.addr">Prague, Czech Republic</div>
        </div>
      </div>
      <form class="form" onsubmit="return false;">
        <div class="fld">
          <label data-i18n="form.name">Your name</label>
          <input type="text" name="name" />
        </div>
        <div class="fld">
          <label data-i18n="form.email">Work email</label>
          <input type="email" name="email" />
        </div>
        <div class="fld">
          <label data-i18n="form.org">Organization</label>
          <input type="text" name="org" />
        </div>
        <div class="fld">
          <label data-i18n="form.msg">How can we help?</label>
          <textarea name="msg"></textarea>
        </div>
        <button class="btn-lg btn-primary" type="submit" data-i18n="form.send">Send request</button>
        <div class="fnote" data-i18n="form.note">This prototype form does not submit. Use the email above.</div>
      </form>
    </div>
  </div>
</section>

<footer class="ftr" id="site-footer"></footer>

<script src="assets/i18n-data.js"></script>
<script src="assets/products-catalog.js"></script>
<script src="assets/site.js"></script>
</body>
</html>
